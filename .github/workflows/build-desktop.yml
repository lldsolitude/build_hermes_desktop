name: Desktop App Build (Lite Client)

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Git ref from NousResearch/hermes-agent to build (tag, branch, or SHA)'
        required: true
        default: 'main'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            runner: macos-latest
            build_args: --mac dmg
          - platform: win
            runner: windows-latest
            build_args: --win nsis msi
          - platform: linux
            runner: ubuntu-latest
            build_args: --linux AppImage deb rpm

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Install Linux system deps (AppImage needs fuse, rpmbuild)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libfuse2 rpm

      - uses: actions/checkout@v6
        with:
          repository: NousResearch/hermes-agent
          ref: ${{ github.event.inputs.git_ref || 'main' }}
          fetch-depth: 1

      - name: Read upstream version
        id: version
        shell: bash
        run: |
          v=$(node -p "require('./apps/desktop/package.json').version")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Upstream version: $v"

      - uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Build desktop renderer
        run: npm --prefix apps/desktop run build

      - name: Build desktop installers
        shell: bash
        env:
          NODE_OPTIONS: --max-old-space-size=16384
        run: |
          set -euo pipefail
          npm --prefix apps/desktop run builder -- \
            ${{ matrix.build_args }} \
            --publish never \
            --config.extraMetadata.version="${{ steps.version.outputs.version }}" \
            --config.extraMetadata.homepage="https://hermes-agent.nousresearch.com"

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd apps/desktop/release
          for f in *.dmg *.zip *.exe *.msi *.AppImage *.deb *.rpm; do
            [ -f "$f" ] && sha256sum "$f"
          done > SHA256SUMS-${{ matrix.platform }}.txt
          cat SHA256SUMS-${{ matrix.platform }}.txt

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.exe
            apps/desktop/release/*.msi
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.rpm
            apps/desktop/release/SHA256SUMS-${{ matrix.platform }}.txt
          if-no-files-found: warn
          retention-days: 90
